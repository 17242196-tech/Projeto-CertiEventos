<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ESUDA Conecta | Inscrição em Eventos</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/w3.css">
</head>

<body>
  <header>
    <img src="img/logo.png" alt="Logo ESUDA Conecta" class="logo-img">
    <!-- menu omitido para simplificar -->
  </header>

  <main>
    <div class="form-page-wrapper">
      <div class="cadastro-form-panel">
        <h1 class="form-title-main color-esuda-text">Faça Sua Inscrição</h1>
        <p class="form-subtitle">Preencha seus dados pessoais e selecione o evento desejado.</p>

        <form id="cadastroForm">
          <div class="form-group">
            <label for="evento" class="form-label">Selecione o Evento</label>
            <select id="evento" name="evento" class="form-input" required>
              <option value="" disabled selected>Escolha o evento</option>
              <!-- opções serão carregadas dinamicamente -->
            </select>
          </div>

          <h2 class="form-section-title">Dados Pessoais</h2>
          <div class="form-grid-2">
            <div class="form-group">
              <label for="nome" class="form-label">Nome Completo</label>
              <input type="text" id="nome" name="nome" class="form-input" required>
            </div>
            <div class="form-group">
              <label for="email" class="form-label">Endereço de E-mail</label>
              <input type="email" id="email" name="email" class="form-input" required>
            </div>
            <div class="form-group">
              <label for="cpf" class="form-label">CPF</label>
              <input type="text" id="cpf" name="cpf" maxlength="14" class="form-input"
                     placeholder="000.000.000-00" required>
            </div>
            <div class="form-group">
              <label for="rg" class="form-label">RG</label>
              <input type="text" id="rg" name="rg" maxlength="20" class="form-input" required>
            </div>
            <div class="form-group">
              <label for="telefone" class="form-label">Telefone de Contato</label>
              <input type="tel" id="telefone" name="telefone" maxlength="15" class="form-input"
                     placeholder="(00) 00000-0000" required>
            </div>
          </div>

          <div class="form-group">
            <label for="endereco" class="form-label">Endereço Completo</label>
            <textarea id="endereco" name="endereco" rows="2" class="form-input" required></textarea>
          </div>

          <div class="checkbox-group">
            <input id="aceite_termos" name="aceite_termos" type="checkbox" class="form-checkbox" required>
            <label for="aceite_termos" class="checkbox-label">
              Aceito os Termos de Serviço e a Política de Privacidade.
            </label>
          </div>

          <div class="form-actions">
            <button type="button" onclick="history.back()" class="btn-voltar-form">VOLTAR</button>
            <!-- botão começa ativo para garantir teste -->
            <button type="submit" id="submitButton" class="btn-submit-esuda">FINALIZAR INSCRIÇÃO</button>
          </div>
        </form>

        <div id="message-box" class="form-message-box hidden" role="alert"></div>
      </div>
    </div>
  </main>

  <script>
    // Carregar eventos dinamicamente da API
    async function carregarEventos() {
      try {
        const response = await fetch("http://localhost:3000/eventos");
        const eventos = await response.json();

        const select = document.getElementById("evento");
        eventos.forEach(ev => {
          const option = document.createElement("option");
          option.value = ev.id;
          option.textContent = ev.titulo;
          select.appendChild(option);
        });
      } catch (error) {
        console.error("Erro ao carregar eventos:", error);
      }
    }

    // Função de inscrição
    async function handleCadastro(e) {
      e.preventDefault();
      console.log("Formulário enviado!"); // teste no Console

      const participante = {
        nome_completo: document.getElementById("nome").value.trim(),
        email: document.getElementById("email").value.trim(),
        cpf: document.getElementById("cpf").value.trim(),
        rg: document.getElementById("rg").value.trim(),
        telefone: document.getElementById("telefone").value.trim(),
        endereco: document.getElementById("endereco").value.trim(),
        evento_id: document.getElementById("evento").value
      };

      try {
        const response = await fetch("http://localhost:3000/participantes", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(participante)
        });

        const msgBox = document.getElementById("message-box");
        msgBox.classList.remove("hidden");

        if (!response.ok) {
          msgBox.textContent = "Erro ao realizar inscrição.";
          msgBox.style.color = "red";
          return;
        }

        const data = await response.json();
        console.log("Resposta da API:", data);

        msgBox.textContent = `Inscrição realizada com sucesso!`;
        msgBox.style.color = "green";

        document.getElementById("cadastroForm").reset();
      } catch (error) {
        console.error("Erro:", error);
        const msgBox = document.getElementById("message-box");
        msgBox.classList.remove("hidden");
        msgBox.textContent = "Erro de conexão com o servidor.";
        msgBox.style.color = "red";
      }
    }

    // Ativar o submit via JS
    document.getElementById("cadastroForm").addEventListener("submit", handleCadastro);

    // Chamar ao carregar a página
    carregarEventos();
  </script>
</body>
</html>
